# Kerberos + AD Configuration (ドメイン参加クライアント + Linux非ドメインサーバー)

# Server Configuration
server.port=8082
spring.application.name=adauth

# Kerberos Configuration
# サービスプリンシパル（ADドメイン管理者が作成）
# 例: HTTP/mylinuxserver.company.com@COMPANY.COM
kerberos.principal=HTTP/your-linux-server.domain.com@DOMAIN.COM
# Keytabファイルの場所（ADから生成したファイル）
kerberos.keytab=/etc/krb5.keytab

# Active Directory Configuration  
ad.domain=YOUR_DOMAIN.COM
ad.url=ldap://dc.domain.com:389
ad.searchBase=DC=domain,DC=com

# JVM System Properties for Kerberos
# これらの設定により詳細なKerberosデバッグが有効になります
java.security.krb5.realm=DOMAIN.COM
java.security.krb5.kdc=dc.domain.com
sun.security.krb5.debug=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.kerberos=DEBUG
logging.level.com.example.adauth=DEBUG

# Session Configuration
server.servlet.session.timeout=30m