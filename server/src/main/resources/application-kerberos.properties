# Kerberos + AD Configuration (ドメイン参加クライアント + Linux非ドメインサーバー)

# Server Configuration
server.port=8082
spring.application.name=adauth

# Kerberos Configuration
# K8S Service用のサービスプリンシパル
# 例: HTTP/winauth-service.winauth.svc.cluster.local@COMPANY.COM
kerberos.principal=${KERBEROS_PRINCIPAL:HTTP/winauth-service.winauth.svc.cluster.local@DOMAIN.COM}
# Keytabファイルの場所（SecretからマウントされたPath）
kerberos.keytab=${KERBEROS_KEYTAB:/etc/krb5/krb5.keytab}

# Active Directory Configuration  
ad.domain=${AD_DOMAIN:YOUR_DOMAIN.COM}
ad.url=${AD_URL:ldap://dc.domain.com:389}
ad.searchBase=${AD_SEARCH_BASE:DC=domain,DC=com}

# JVM System Properties for Kerberos
# K8S環境では環境変数またはJAVA_OPTSで設定
java.security.krb5.conf=${KRB5_CONFIG:/etc/krb5/krb5.conf}
java.security.krb5.realm=${KERBEROS_REALM:DOMAIN.COM}
java.security.krb5.kdc=${KERBEROS_KDC:dc.domain.com}
sun.security.krb5.debug=${KERBEROS_DEBUG:true}

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.kerberos=DEBUG
logging.level.com.example.adauth=DEBUG

# Session Configuration
server.servlet.session.timeout=30m