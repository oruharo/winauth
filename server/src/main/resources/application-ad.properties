# Active Directory Configuration
# ADドメイン名（例: company.local）
ad.domain=YOUR_DOMAIN.LOCAL

# ADサーバーのURL（例: ldap://dc.company.local:389 または ldaps://dc.company.local:636）
ad.url=ldap://YOUR_AD_SERVER:389

# オプション: ルートDN（通常は自動的に検出されますが、必要に応じて指定）
# ad.rootDn=DC=company,DC=local

# オプション: カスタム検索フィルター（デフォルト: (sAMAccountName={0})）
# ad.searchFilter=(sAMAccountName={0})

# オプション: 接続タイムアウト（ミリ秒）
ad.connection.timeout=5000

# オプション: 読み取りタイムアウト（ミリ秒）  
ad.read.timeout=5000

# SSL/TLS設定（LDAPS使用時）
# ad.ssl.trustStore=/path/to/truststore.jks
# ad.ssl.trustStorePassword=changeit

# その他のSpring設定（application.propertiesから継承）
server.port=8081
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.ldap=DEBUG