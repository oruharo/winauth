# Server Configuration
server.port=8082
spring.application.name=adauth

# Logging
logging.level.root=INFO
logging.level.com.example.adauth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ldap=DEBUG

# Active Directory Configuration
# ドメイン名（例: company.local）
ad.domain=YOUR_DOMAIN.LOCAL

# ADサーバーのURL（例: ldap://dc.company.local:389）
ad.url=ldap://YOUR_AD_SERVER:389

# 検索ベースDN（オプション）
# ad.searchBase=DC=company,DC=local

# ユーザー検索フィルター
ad.userSearchFilter=(sAMAccountName={0})

# グループ検索ベース（オプション）
# ad.groupSearchBase=OU=Groups,DC=company,DC=local

# Session Configuration
server.servlet.session.timeout=30m

# Thymeleaf Configuration
spring.thymeleaf.cache=false