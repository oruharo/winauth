# Application Configuration
spring.application.name=winauth

# Server Configuration
server.port=8081
server.servlet.context-path=/

# Logging Configuration
logging.level.root=INFO
logging.level.waffle=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.example.winauth=DEBUG

# Windows Authentication Configuration
waffle.servlet.sso.enabled=true
waffle.servlet.sso.protocols=Negotiate,NTLM

# Error Handling
server.error.whitelabel.enabled=false
server.error.path=/error

# Session Configuration
server.servlet.session.timeout=30m

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# LDAP Configuration (for test environment)
spring.ldap.embedded.ldif=classpath:test-data.ldif
spring.ldap.embedded.base-dn=dc=testdomain,dc=local
spring.ldap.embedded.port=8389

# LDAP Authentication
spring.ldap.urls=ldap://localhost:8389
spring.ldap.base=dc=testdomain,dc=local
spring.ldap.username=cn=admin,dc=testdomain,dc=local
spring.ldap.password=admin123
