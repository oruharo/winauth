# Server Configuration
server.port=8082
spring.application.name=adauth

# Logging
logging.level.root=INFO
logging.level.com.example.adauth=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ldap=DEBUG
logging.level.org.springframework.security.ldap=TRACE
logging.level.org.springframework.web=DEBUG

# ログファイル出力（無効化 - 標準出力のみ使用）
# logging.file.name=logs/adauth.log
# logging.file.max-size=10MB
# logging.file.max-history=10

# コンソール出力パターン（見やすい形式）
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 標準出力への出力を強制
spring.output.ansi.enabled=always

# Active Directory Configuration
# ドメイン名（例: company.local）
ad.domain=YOUR_DOMAIN.LOCAL

# ADサーバーのURL（例: ldap://dc.company.local:389）
ad.url=ldap://YOUR_AD_SERVER:389

# 検索ベースDN（オプション）
# ad.searchBase=DC=company,DC=local

# ユーザー検索フィルター
ad.userSearchFilter=(sAMAccountName={0})

# グループ検索ベース（オプション）
# ad.groupSearchBase=OU=Groups,DC=company,DC=local

# Session Configuration
server.servlet.session.timeout=30m

# Thymeleaf Configuration
spring.thymeleaf.cache=false