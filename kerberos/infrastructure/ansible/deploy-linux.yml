---
- name: Deploy WinAuth Linux Application Server
  hosts: linux_servers
  become: yes
  gather_facts: yes
  
  tasks:
    - name: Set stack name variable
      set_fact:
        stack_name_var: "{{ lookup('env', 'STACK_NAME') }}"
      run_once: true

    - name: Set default stack name if empty
      set_fact:
        stack_name_var: "has-kerberos-test-9606"
      run_once: true
      when: stack_name_var == "" or stack_name_var is not defined

    - name: Get ALB DNS name from CloudFormation
      delegate_to: localhost
      become: no
      amazon.aws.cloudformation_info:
        stack_name: "{{ stack_name_var }}"
      register: stack_info
      run_once: true

    - name: Set ALB DNS name fact
      set_fact:
        alb_dns_name: "{{ stack_info.cloudformation[stack_name_var].stack_outputs.ALBDNSName }}"
      when: stack_info.cloudformation is defined and stack_name_var in stack_info.cloudformation

    - name: Update all packages
      dnf:
        name: "*"
        state: latest
      
    - name: Install required packages
      dnf:
        name:
          - git
          - krb5-workstation
          - docker
        state: present

    - name: Install Docker Compose plugin
      shell: |
        mkdir -p /usr/local/lib/docker/cli-plugins
        curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
      args:
        creates: /usr/local/lib/docker/cli-plugins/docker-compose
    
    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Set hostname
      hostname:
        name: "{{ app_hostname }}"

    - name: Add domain controllers to /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        create: yes
      loop:
        - "{{ dc1_ip }} dc1.domain1.lab DOMAIN1.LAB"
        - "{{ dc2_ip }} dc2.domain2.lab DOMAIN2.LAB"
    
    - name: Create Kerberos configuration
      template:
        src: krb5.conf.j2
        dest: /etc/krb5.conf
        mode: '0644'
      
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Create config directory
      file:
        path: "{{ app_dir }}/config"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'
    
    - name: Check if source directory is a git repository
      stat:
        path: "{{ app_dir }}/source/.git"
      register: git_repo_check

    - name: Remove old source directory if not a git repository
      file:
        path: "{{ app_dir }}/source"
        state: absent
      when: not git_repo_check.stat.exists

    - name: Clone or update WinAuth repository from GitHub
      git:
        repo: "https://github.com/oruharo/winauth.git"
        dest: "{{ app_dir }}/source"
        version: main
        force: yes
      become_user: "{{ app_user }}"

    - name: Install Node.js 22 LTS
      dnf:
        name:
          - nodejs22
          - nodejs22-npm
        state: present

    - name: Build WinAuth client application
      shell: |
        cd {{ app_dir }}/source/kerberos/client
        npm install --legacy-peer-deps
        npm run build
      become_user: "{{ app_user }}"
    
    - name: Create Kerberos configuration for Docker
      template:
        src: krb5.conf.j2
        dest: "{{ app_dir }}/config/krb5.conf"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Upload keytab file to config directory
      copy:
        src: ./keytabs/winauth-combined.keytab
        dest: "{{ app_dir }}/config/winauth.keytab"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'
      ignore_errors: yes

    - name: Create application configuration
      template:
        src: application.properties.j2
        dest: "{{ app_dir }}/config/application.properties"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Create Kerberos application configuration
      template:
        src: application-kerberos.properties.j2
        dest: "{{ app_dir }}/config/application-kerberos.properties"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Build and start Docker containers
      shell: |
        cd {{ app_dir }}/source/kerberos
        docker compose build
        docker compose up -d
      become_user: "{{ app_user }}"



  handlers: